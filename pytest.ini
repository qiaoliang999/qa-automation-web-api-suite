[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    api: API tests using httpx against the FastAPI app
    ui: UI tests using Playwright against the HTML interface
    smoke: High-value smoke coverage suitable for PR gates
filterwarnings =
    ignore::DeprecationWarning
