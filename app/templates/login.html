{% extends "base.html" %}
{% block title %}Login · TaskTrack{% endblock %}
{% block content %}
<section class="card login-card">
  <h1>Sign in</h1>
  <p class="muted">
    Seeded: <code>alice / alice123</code>, <code>bob / bob1234</code>,
    <code>admin / admin123</code>
  </p>

  {% if error %}
  <div class="alert alert-error" data-testid="login-error" role="alert">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login" data-testid="login-form">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username"
           data-testid="username-input" required />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password"
           data-testid="password-input" required />

    <button type="submit" class="btn btn-primary" data-testid="login-submit">Login</button>
  </form>
</section>
{% endblock %}
